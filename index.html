<!DOCTYPE html>
<html>
<head>
  <title>MonochromeAI Swap</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers/dist/ethers.min.js"></script>

  <style>
    body {
      margin:0;
      font-family: Arial, sans-serif;
      background:#05070d;
      color:#fff;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .card {
      background:#0b0f19;
      padding:25px;
      border-radius:15px;
      width:350px;
    }

    input {
      width:100%;
      padding:10px;
      margin:10px 0;
      border:none;
      border-radius:8px;
      background:#111827;
      color:#fff;
    }

    button {
      width:100%;
      padding:12px;
      margin-top:10px;
      border:none;
      border-radius:8px;
      background:#f7931a;
      color:#000;
      font-weight:bold;
      cursor:pointer;
    }

    .wallet {
      background:#111827;
    }
  </style>
</head>

<body>

<div class="card">

  <h2 style="text-align:center;">MonochromeAI Swap</h2>

  <!-- WALLET -->
  <button class="wallet" onclick="connectWallet()" id="connectBtn">
    Connect Wallet
  </button>

  <p id="walletAddress" style="font-size:12px; text-align:center;"></p>

  <!-- INPUT -->
 <input type="text" placeholder="From Token (ETH)" id="fromToken">
<input type="text" placeholder="To Token (USDC)" id="toToken">
<input type="number" placeholder="Amount" id="amount">

  <button onclick="swap()">Swap</button>

</div>

<script>
async function connectWallet() {
  if (typeof window.ethereum !== "undefined") {
    try {
      const accounts = await window.ethereum.request({
        method: "eth_requestAccounts"
      });

      document.getElementById("connectBtn").innerText = "Connected";
      document.getElementById("walletAddress").innerText =
        accounts[0].slice(0,6) + "..." + accounts[0].slice(-4);

    } catch (error) {
      console.log(error);
      alert("User rejected connection");
    }
  } else {
    alert("Wallet tidak ditemukan");
  }
}

// 🔥 TAMBAHKAN DI SINI
const ROUTER = "0x2626664c2603336E57B271c5C0b26F421741e481";

const TOKENS = {
  ETH: "0x4200000000000000000000000000000000000006",
  USDC: "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913"
};

async function swap() {
  if (!window.ethereum) {
    alert("Wallet belum connect");
    return;
  }

  try {
    const provider = new ethers.providers.Web3Provider(window.ethereum);
    const signer = provider.getSigner();

    const amountInput = document.getElementById("amount").value;
    const from = document.getElementById("fromToken").value.toUpperCase();
    const to = document.getElementById("toToken").value.toUpperCase();

    if (!TOKENS[from] || !TOKENS[to]) {
      alert("Token tidak dikenali (pakai ETH / USDC)");
      return;
    }

    const router = new ethers.Contract(
      ROUTER,
      [
        "function exactInputSingle((address,address,uint24,address,uint256,uint256,uint256,uint160)) payable returns (uint256)"
      ],
      signer
    );

    const amountIn = ethers.utils.parseEther(amountInput);

    const params = {
      tokenIn: TOKENS[from],
      tokenOut: TOKENS[to],
      fee: 3000,
      recipient: await signer.getAddress(),
      deadline: Math.floor(Date.now() / 1000) + 600,
      amountIn: amountIn,
      amountOutMinimum: 0,
      sqrtPriceLimitX96: 0
    };

    const tx = await router.exactInputSingle(params, {
      value: amountIn
    });

    alert("TX: " + tx.hash);

    await tx.wait();

    alert("Swap berhasil 🚀");

  } catch (err) {
    console.error(err);
    alert("Swap gagal");
  }
}
</script>

</body>
</html>
