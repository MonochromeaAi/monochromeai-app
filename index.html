<!DOCTYPE html>
<html>
<head>
  <title>MonochromeAI Swap</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers/dist/ethers.min.js"></script>
  <style>
    body {
      margin:0;
      font-family: Arial, sans-serif;
      background:#05070d;
      color:#fff;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .card {
      background:#0b0f19;
      padding:25px;
      border-radius:15px;
      width:350px;
      box-shadow:0 0 20px rgba(0,0,0,0.6);
    }

    h2 {
      text-align:center;
    }

    input {
      width:100%;
      padding:12px;
      margin:10px 0;
      border:none;
      border-radius:8px;
      background:#111827;
      color:#fff;
    }

    button {
      width:100%;
      padding:12px;
      margin-top:10px;
      border:none;
      border-radius:8px;
      background:#f7931a;
      color:#000;
      font-weight:bold;
      cursor:pointer;
    }

    button:hover {
      opacity:0.8;
    }

    .wallet {
      margin-bottom:15px;
      background:#111827;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>MonochromeAI Swap</h2>

  <button class="wallet" onclick="connectWallet()">
    Connect Wallet
  </button>

  <input type="text" placeholder="From Token (ETH)">
  <input type="text" placeholder="To Token (USDT)">
  <input type="number" placeholder="Amount">

  <button onclick="swap()">Swap</button>
</div>

<script>
async function connectWallet() {
  if (window.ethereum) {
    try {
      const accounts = await window.ethereum.request({
        method: 'eth_requestAccounts'
      });
      alert("Connected: " + accounts[0]);
    } catch (err) {
      alert("Connection failed");
    }
  } else {
    alert("Install MetaMask!");
  }
}

function swap() {
  alert("Swap feature coming soon 🚀");
}
</script>

</body>
</html>
