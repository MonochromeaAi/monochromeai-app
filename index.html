<!DOCTYPE html>
<html>
<head>
  <title>MonochromeAI Swap</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers/dist/ethers.min.js"></script>

  <style>
    body {
      margin:0;
      font-family: Arial, sans-serif;
      background:#05070d;
      color:#fff;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .card {
      background:#0b0f19;
      padding:25px;
      border-radius:15px;
      width:350px;
    }

    input {
      width:100%;
      padding:10px;
      margin:10px 0;
      border:none;
      border-radius:8px;
      background:#111827;
      color:#fff;
    }

    button {
      width:100%;
      padding:12px;
      margin-top:10px;
      border:none;
      border-radius:8px;
      background:#f7931a;
      color:#000;
      font-weight:bold;
      cursor:pointer;
    }

    .wallet {
      background:#111827;
    }
  </style>
</head>

<body>

<div class="card">

  <h2 style="text-align:center;">MonochromeAI Swap</h2>

  <!-- WALLET -->
  <button class="wallet" onclick="connectWallet()" id="connectBtn">
    Connect Wallet
  </button>

  <p id="walletAddress" style="font-size:12px; text-align:center;"></p>

  <!-- INPUT -->
  <input type="text" placeholder="From Token (ETH)">
  <input type="text" placeholder="To Token (USDT)">
  <input type="number" placeholder="Amount">

  <button onclick="swap()">Swap</button>

</div>

<script>
async function connectWallet() {
  if (typeof window.ethereum !== "undefined") {
    try {
      const accounts = await window.ethereum.request({
        method: "eth_requestAccounts"
      });

      document.getElementById("connectBtn").innerText = "Connected";
      document.getElementById("walletAddress").innerText =
        accounts[0].slice(0,6) + "..." + accounts[0].slice(-4);

    } catch (error) {
      console.log(error);
      alert("User rejected connection");
    }
  } else {
    alert("MetaMask tidak ditemukan");
  }
}
</script>

</body>
</html>
