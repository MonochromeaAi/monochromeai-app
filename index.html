<!DOCTYPE html>
<html>
<head>
  <title>MonochromeAI Swap</title>

  <!-- Ethers FIX -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#05070d;
      color:#fff;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .card {
      background:#0b0f19;
      padding:25px;
      border-radius:15px;
      width:350px;
    }

    input, select {
      width:100%;
      padding:10px;
      margin:10px 0;
      border:none;
      border-radius:8px;
      background:#111827;
      color:#fff;
    }

    button {
      width:100%;
      padding:12px;
      margin-top:10px;
      border:none;
      border-radius:8px;
      background:#f7931a;
      color:#000;
      font-weight:bold;
      cursor:pointer;
    }

    .wallet {
      background:#111827;
    }
  </style>
</head>

<body>

<div class="card">

  <h2 style="text-align:center;">MonochromeAI Swap</h2>

  <!-- WALLET -->
  <button class="wallet" onclick="connectWallet()" id="connectBtn">
    Connect Wallet
  </button>

  <p id="walletAddress" style="font-size:12px;text-align:center;"></p>

  <!-- TOKEN -->
  <select id="fromToken">
    <option value="ETH">ETH</option>
    <option value="USDC">USDC</option>
  </select>

  <select id="toToken">
    <option value="USDC">USDC</option>
    <option value="ETH">ETH</option>
  </select>

  <!-- AMOUNT -->
  <input type="number" id="amount" placeholder="Amount">

  <button onclick="swap()">Swap</button>

</div>

<script>
// CONNECT WALLET
async function connectWallet() {
  if (window.ethereum) {
    try {
      const accounts = await window.ethereum.request({
        method: "eth_requestAccounts"
      });

      document.getElementById("connectBtn").innerText = "Connected";
      document.getElementById("walletAddress").innerText =
        accounts[0].slice(0,6) + "..." + accounts[0].slice(-4);

    } catch (err) {
      alert("User rejected");
    }
  } else {
    alert("Install wallet dulu");
  }
}

// CONFIG BASE + UNISWAP
const ROUTER = "0x2626664c2603336E57B271c5C0b26F421741e481";

const TOKENS = {
  ETH: "0x4200000000000000000000000000000000000006",
  USDC: "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913"
};

// SWAP
async function swap() {
  if (!window.ethereum) {
    alert("Connect wallet dulu");
    return;
  }

  const amountInput = document.getElementById("amount").value;
  const from = document.getElementById("fromToken").value;
  const to = document.getElementById("toToken").value;

  if (!amountInput || amountInput <= 0) {
    alert("Masukkan amount");
    return;
  }

  try {
    const provider = new ethers.providers.Web3Provider(window.ethereum);
    const signer = provider.getSigner();

    const router = new ethers.Contract(
      ROUTER,
      [
        "function exactInputSingle((address,address,uint24,address,uint256,uint256,uint256,uint160)) payable returns (uint256)"
      ],
      signer
    );

    const amountIn = ethers.utils.parseEther(amountInput);

    const params = {
      tokenIn: TOKENS[from],
      tokenOut: TOKENS[to],
      fee: 3000,
      recipient: await signer.getAddress(),
      deadline: Math.floor(Date.now() / 1000) + 600,
      amountIn: amountIn,
      amountOutMinimum: 0,
      sqrtPriceLimitX96: 0
    };

    const tx = await router.exactInputSingle(params, {
      value: amountIn
    });

    alert("TX: " + tx.hash);

    await tx.wait();

    alert("Swap berhasil 🚀");

  } catch (err) {
    console.error(err);
    alert("Swap gagal");
  }
}
</script>

</body>
</html>
