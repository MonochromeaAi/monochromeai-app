<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html>
<html b:version='2'
      xmlns='http://www.w3.org/1999/xhtml'
      xmlns:b='http://www.google.com/2005/gml/b'
      xmlns:data='http://www.google.com/2005/gml/data'
      xmlns:expr='http://www.google.com/2005/gml/expr'>

<head>
<meta charset='UTF-8'/>
<meta name='viewport' content='width=device-width, initial-scale=1.0'/>
<title><data:blog.title/></title>

<b:skin><![CDATA[
/* ================= GLOBAL ================= */
body{
  margin:0;
  background:#05070d;
  color:#e5e7eb;
  font-family:Arial, sans-serif;
}

a{ text-decoration:none; }

/* ================= NAVBAR ================= */
#navbar-wrapper{
  position:sticky;
  top:0;
  background:#020408;
  z-index:999;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.navbar-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 20px;
}

.nav-brand{
  font-weight:bold;
  letter-spacing:2px;
}

.nav-links{
  display:flex;
  gap:18px;
  list-style:none;
}

.nav-links li a{
  color:#ccc;
  font-size:14px;
}

.nav-links li a:hover{
  color:#00c8ff;
}

.nav-toggle{
  display:none;
  cursor:pointer;
}

/* ================= HERO ================= */
.hero-content{
  padding:80px 20px;
  text-align:center;
}

.hero-title{
  font-size:2rem;
  font-weight:700;
}

/* ================= MAIN ================= */
#main-wrapper{
  max-width:1200px;
  margin:auto;
  padding:30px 20px;
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:30px;
}

/* ================= POST ================= */
.post{
  background:#0b0f19;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

.post-title a{
  color:#fff;
}

.post-title a:hover{
  color:#00c8ff;
}

/* ================= SIDEBAR ================= */
.widget-card{
  background:#0b0f19;
  padding:18px;
  border-radius:12px;
  margin-bottom:20px;
}

/* ================= FOOTER ================= */
#footer-wrapper{
  background:#020408;
  margin-top:40px;
}

.footer-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
  padding:40px;
}

.footer-bottom{
  text-align:center;
  padding:20px;
  border-top:1px solid rgba(255,255,255,0.05);
}

/* ================= RESPONSIVE ================= */
@media(max-width:768px){
  #main-wrapper{
    grid-template-columns:1fr;
  }

  .nav-links{
    display:none;
    flex-direction:column;
    position:absolute;
    top:60px;
    left:0;
    right:0;
    background:#020408;
  }

  .nav-links.open{ display:flex; }

  .nav-toggle{
    display:block;
  }

  .footer-grid{
    grid-template-columns:1fr;
  }
}
]]></b:skin>

</head>

<body>

<!-- NAVBAR -->
<div id='navbar-wrapper'>
  <div class='navbar-inner'>

    <div class='nav-brand'>◆ CRYPTONEX</div>

    <ul class='nav-links' id='nav-links'>
      <li><a href='/'>Home</a></li>
      <li><a href='/p/market.html'>Market</a></li>
      <li><a href='/p/portfolio.html'>Portfolio</a></li>
      <li><a href='/p/news.html'>News</a></li>
    </ul>

    <div class='nav-toggle'
         onclick='document.getElementById(&quot;nav-links&quot;).classList.toggle(&quot;open&quot;)'>
      ☰
    </div>

  </div>
</div>

<!-- HERO -->
<div class='hero-content'>
  <h1 class='hero-title'>Crypto Intelligence Hub</h1>
  <p>Real-time market insights &amp; analytics</p>
</div>

<!-- MAIN -->
<div id='main-wrapper'>

  <!-- BLOG -->
  <div>

    <b:section id='main' showaddelement='yes'>

      <b:widget id='Blog1' type='Blog' locked='true'>

        <b:includable id='main' var='top'>
          <b:loop values='data:posts' var='post'>
            <b:include data='post' name='post'/>
          </b:loop>
        </b:includable>

        <b:includable id='post' var='post'>
          <div class='post'>

            <h2 class='post-title'>
              <b:if cond='data:post.url'>
                <a expr:href='data:post.url'><data:post.title/></a>
              <b:else/>
                <data:post.title/>
              </b:if>
            </h2>

            <div class='post-body'>
              <data:post.body/>
            </div>

          </div>
        </b:includable>

      </b:widget>

    </b:section>

  </div>

  <!-- SIDEBAR -->
  <div>

    <b:section id='sidebar' showaddelement='yes'>

      <b:widget id='HTML1' type='HTML'>
        <b:widget-settings>
          <b:widget-setting name='content'>
            &lt;div class=&quot;widget-card&quot;&gt;
            &lt;h3&gt;Market&lt;/h3&gt;
            BTC $67K ↑
            &lt;/div&gt;
          </b:widget-setting>
        </b:widget-settings>

        <b:includable id='main'>
          <div class='widget-content'><data:content/></div>
        </b:includable>

      </b:widget>

    </b:section>

  </div>

</div>

<!-- FOOTER -->
<div id='footer-wrapper'>

  <div class='footer-grid'>
    <div>About</div>
    <div>Links</div>
    <div>Contact</div>
    <div>Social</div>
  </div>

  <div class='footer-bottom'>
    &#169; 2026 CRYPTONEX
  </div>

</div>

<!-- JS -->
<script>
//<![CDATA[
document.addEventListener('DOMContentLoaded', function(){
  var toggle=document.getElementById('nav-toggle');
  var links=document.getElementById('nav-links');

  if(toggle && links){
    toggle.addEventListener('click', function(){
      links.classList.toggle('open');
    });
  }
});
//]]>
</script>

</body>
</html>
